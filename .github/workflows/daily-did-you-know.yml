name: Send Daily Did You Know

on:
  schedule:
    # GitHub cron is UTC. These two schedules cover 10:00 Israel time in summer and winter.
    - cron: "0 7 * * *"
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
      DAILY_SEND_TIME: ${{ vars.DAILY_SEND_TIME || '10:00' }}
      TIMEZONE: ${{ vars.TIMEZONE || 'Asia/Jerusalem' }}
      USER_AGENT: ${{ vars.USER_AGENT || 'hebrew-wikipedia-dyk-bot/0.1 (GitHub Actions)' }}
      GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Decide whether this run should send
        id: due
        shell: python
        run: |
          from datetime import datetime, timedelta, timezone
          import os
          from zoneinfo import ZoneInfo

          if os.environ["GITHUB_EVENT_NAME"] == "workflow_dispatch":
              should_send = True
              reason = "manual run"
          else:
              target_hour, target_minute = map(int, os.environ["DAILY_SEND_TIME"].split(":", 1))
              cron_minute, cron_hour, *_ = os.environ["GITHUB_EVENT_SCHEDULE"].split()
              scheduled_utc = datetime.now(timezone.utc).replace(
                  hour=int(cron_hour),
                  minute=int(cron_minute),
                  second=0,
                  microsecond=0,
              )
              if scheduled_utc > datetime.now(timezone.utc):
                  scheduled_utc -= timedelta(days=1)

              scheduled_local = scheduled_utc.astimezone(ZoneInfo(os.environ["TIMEZONE"]))
              should_send = scheduled_local.hour == target_hour and scheduled_local.minute == target_minute
              reason = f"scheduled local time was {scheduled_local:%Y-%m-%d %H:%M %Z}"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"should_send={str(should_send).lower()}\n")
              output.write(f"reason={reason}\n")

          print(f"should_send={should_send} ({reason})")

      - name: Install dependencies
        if: steps.due.outputs.should_send == 'true'
        run: python -m pip install -r requirements.txt

      - name: Run tests
        if: steps.due.outputs.should_send == 'true'
        run: python -m pytest

      - name: Send daily item
        if: steps.due.outputs.should_send == 'true'
        run: python -m wiki_didyouknow_bot --send-once
