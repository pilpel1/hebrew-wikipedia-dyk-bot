name: Send Daily Did You Know

on:
  # Triggered by an external scheduler (e.g. cron-job.org) that calls the GitHub
  # API at a precise time, because GitHub's own scheduled workflows are unreliable.
  # Also runnable manually from the Actions tab.
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
      USER_AGENT: ${{ vars.USER_AGENT || 'hebrew-wikipedia-dyk-bot/0.1 (GitHub Actions)' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest

      - name: Send daily item
        run: python -m wiki_didyouknow_bot --send-once
