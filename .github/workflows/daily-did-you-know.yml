name: Send Daily Did You Know

on:
  schedule:
    # GitHub scheduled workflows can be delayed or dropped.
    # Try several times through the UTC morning; the first run after 09:17 Israel time sends.
    - cron: "2,17,32,47 6-11 * * *"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
      DAILY_SEND_TIME: ${{ vars.DAILY_SEND_TIME || '09:17' }}
      TIMEZONE: ${{ vars.TIMEZONE || 'Asia/Jerusalem' }}
      USER_AGENT: ${{ vars.USER_AGENT || 'hebrew-wikipedia-dyk-bot/0.1 (GitHub Actions)' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Decide whether this run should send
        id: due
        shell: python
        run: |
          from datetime import datetime, timedelta
          import os
          from zoneinfo import ZoneInfo

          timezone_name = os.environ["TIMEZONE"]
          now = datetime.now(ZoneInfo(timezone_name))
          local_date = now.date().isoformat()

          if os.environ["GITHUB_EVENT_NAME"] == "workflow_dispatch":
              allow_send = True
              reason = "manual run"
          else:
              target_hour, target_minute = map(int, os.environ["DAILY_SEND_TIME"].split(":", 1))
              target = now.replace(hour=target_hour, minute=target_minute, second=0, microsecond=0)
              latest_send_time = target + timedelta(hours=6)
              allow_send = target <= now < latest_send_time
              reason = f"local time is {now:%Y-%m-%d %H:%M %Z}; target window is {target:%H:%M}-{latest_send_time:%H:%M}"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"allow_send={str(allow_send).lower()}\n")
              output.write(f"local_date={local_date}\n")
              output.write(f"reason={reason}\n")

          print(f"allow_send={allow_send} ({reason})")

      - name: Restore daily send marker
        id: daily-send-cache
        if: github.event_name == 'schedule' && steps.due.outputs.allow_send == 'true'
        uses: actions/cache@v4
        with:
          path: .send-cache
          key: dyk-sent-${{ steps.due.outputs.local_date }}

      - name: Install dependencies
        if: steps.due.outputs.allow_send == 'true' && (github.event_name == 'workflow_dispatch' || steps.daily-send-cache.outputs.cache-hit != 'true')
        run: python -m pip install -r requirements.txt

      - name: Run tests
        if: steps.due.outputs.allow_send == 'true' && (github.event_name == 'workflow_dispatch' || steps.daily-send-cache.outputs.cache-hit != 'true')
        run: python -m pytest

      - name: Send daily item
        if: steps.due.outputs.allow_send == 'true' && (github.event_name == 'workflow_dispatch' || steps.daily-send-cache.outputs.cache-hit != 'true')
        run: python -m wiki_didyouknow_bot --send-once

      - name: Mark scheduled send done
        if: github.event_name == 'schedule' && steps.due.outputs.allow_send == 'true' && steps.daily-send-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p .send-cache
          date -u +"sent_at=%Y-%m-%dT%H:%M:%SZ" > .send-cache/sent.txt
